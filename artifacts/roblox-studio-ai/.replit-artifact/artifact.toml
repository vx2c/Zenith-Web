kind = "web"
previewPath = "/"
title = "Zenith – Roblox Studio AI"
version = "1.0.0"
id = "artifacts/roblox-studio-ai"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20301

[services.development]
run = "pnpm --filter @workspace/roblox-studio-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/roblox-studio-ai", "run", "build" ]
serve = "static"
publicDir = "artifacts/roblox-studio-ai/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20301"
BASE_PATH = "/"
